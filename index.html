<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunus Gunes – Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B1F3A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 480px; padding: 40px 24px; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 40px; }
    .app-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      text-align: left;
    }
    .app-card h2 { font-size: 20px; margin-bottom: 4px; }
    .app-card p { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      background: #14b8a6;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .footer { margin-top: 40px; color: #475569; font-size: 13px; }
    a { color: #14b8a6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yunus Gunes</h1>
    <p class="subtitle">Mobile Apps</p>

    <div class="app-card">
      <h2>One Bag</h2>
      <p>Travel Packing List – Akilli bavul hazirlama asistani</p>
      <span class="badge">Google Play</span>
    </div>

    <div class="app-card">
      <h2>Routevia</h2>
      <p>AI destekli seyahat rota planlayici</p>
      <span class="badge">Yakinda</span>
    </div>

    <p class="footer">
      <a href="mailto:routevia@tabserve.com.tr">routevia@tabserve.com.tr</a>
    </p>
  </div>
</body>
</html>
