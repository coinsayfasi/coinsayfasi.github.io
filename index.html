<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunus Güneş — Mobile Apps</title>
<meta name="description" content="Mobile apps by Yunus Güneş: OneBag (smart travel packing list), Routevia (Türkiye gezilecek yerler & rota), and RentFlow (property management for landlords).">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
       background:#0B1F3A;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 0}
  .container{max-width:560px;width:100%;padding:0 24px;text-align:center}
  h1{font-size:30px;letter-spacing:-.5px;margin-bottom:6px}
  .subtitle{color:#94a3b8;margin-bottom:38px;font-size:15px}
  .app-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 20px;margin-bottom:14px;
            text-align:left;transition:transform .15s,border-color .15s,background .15s}
  .app-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.09)}
  .app-card .emoji{font-size:30px;width:52px;height:52px;flex:none;display:grid;place-items:center;
                   background:rgba(255,255,255,.08);border-radius:13px}
  .app-card .body{flex:1}
  .app-card h2{font-size:18px;margin-bottom:2px}
  .app-card p{color:#94a3b8;font-size:13.5px}
  .app-card .arrow{color:#64748b;font-size:20px}
  a.app-card{text-decoration:none;color:inherit}
  .footer{margin-top:34px;color:#64748b;font-size:13px}
  .footer a{color:#94a3b8;text-decoration:none}
</style>
</head>
<body>
  <div class="container">
    <h1>Yunus Güneş</h1>
    <p class="subtitle">Mobile Apps</p>

    <a class="app-card" href="/onebag/">
      <span class="emoji">🎒</span>
      <span class="body"><h2>OneBag</h2><p>Smart travel packing list — pack light, never forget.</p></span>
      <span class="arrow">→</span>
    </a>

    <a class="app-card" href="/routevia-app/">
      <span class="emoji">🧭</span>
      <span class="body"><h2>Routevia</h2><p>Türkiye'nin gezilecek yerleri & akıllı rota planlama.</p></span>
      <span class="arrow">→</span>
    </a>

    <a class="app-card" href="/rentflow/">
      <span class="emoji">🏠</span>
      <span class="body"><h2>RentFlow</h2><p>Property management for landlords — rent, tenants & more.</p></span>
      <span class="arrow">→</span>
    </a>

    <p class="footer"><a href="mailto:teknopattv@gmail.com">teknopattv@gmail.com</a></p>
  </div>
</body>
</html>
