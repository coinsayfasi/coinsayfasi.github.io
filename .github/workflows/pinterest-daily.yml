name: Pinterest daily pins

on:
  # ✅ Standard access ONAYLANDI (2026-06-23) → cron AÇIK. Günde ~12 pin.
  #   token + secret'lar (REFRESH_TOKEN/APP_ID/APP_SECRET/PEXELS) yerinde.
  schedule:
    - cron: "0 18 * * *"   # 21:00 TR → Routevia (Türkiye akşam prime)
    - cron: "0 20 * * *"   # 22:00 CET → OneBag + RentFlow (Avrupa akşam prime)
    - cron: "0 1 * * *"    # 20:00 EST / 17:00 PST → OneBag + RentFlow (ABD akşam prime)
  workflow_dispatch:        # manuel çalıştırma — apps/count ile hedefli
    inputs:
      apps:
        description: "Virgülle app listesi (boş = hepsi). örn: onebag,rentflow"
        default: ""
      count:
        description: "Atılacak pin sayısı"
        default: "1"

permissions:
  contents: write           # to commit the updated state.json

concurrency:
  group: pinterest-daily
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r _automation/pinterest/requirements.txt

      - name: Hedef app + adet (tetikleyen cron'a göre — saat hedefleme)
        id: t
        run: |
          case "${{ github.event.schedule }}" in
            "0 18 * * *") echo "apps=routevia"        >> "$GITHUB_OUTPUT"; echo "n=5" >> "$GITHUB_OUTPUT" ;;  # TR akşam → Routevia 5
            "0 20 * * *") echo "apps=onebag,rentflow" >> "$GITHUB_OUTPUT"; echo "n=7" >> "$GITHUB_OUTPUT" ;;  # AB akşam → OneBag ~4 + RentFlow ~3
            "0 1 * * *")  echo "apps=onebag,rentflow" >> "$GITHUB_OUTPUT"; echo "n=6" >> "$GITHUB_OUTPUT" ;;  # ABD akşam → OneBag ~3 + RentFlow ~3
            *)            echo "apps=${{ github.event.inputs.apps }}" >> "$GITHUB_OUTPUT"; echo "n=${{ github.event.inputs.count }}" >> "$GITHUB_OUTPUT" ;;  # manuel = input'lar (boş app=hepsi, varsayılan 1)
          esac

      - name: Post pins
        env:
          # Tercih edilen: refresh-token modu (her çalışmada taze access token, hiç sönmez)
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          # Alternatif: tek seferlik statik token (30 günde söner)
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIN_APPS: ${{ steps.t.outputs.apps }}
          PINS_PER_RUN: ${{ steps.t.outputs.n }}
        working-directory: _automation/pinterest
        run: python poster.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain _automation/pinterest/state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _automation/pinterest/state.json
            git commit -m "chore(pinterest): update pinned state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep $((RANDOM % 5 + 2))
            done
          else
            echo "No state change to commit."
          fi
