name: Pinterest daily pins

on:
  # ⚠️ Cron KAPALI: PINTEREST_ACCESS_TOKEN + PEXELS_API_KEY eklenince aşağıdaki
  # "schedule:" + 2 cron satırını yorumdan çıkar. Saat hedefleme KİTLEYE göre:
  # schedule:
  #   - cron: "0 18 * * *"   # 21:00 TR → Routevia (Türkiye akşam prime)
  #   - cron: "0 20 * * *"   # 22:00 CET / 15:00 EST → OneBag + RentFlow (AB+ABD)
  workflow_dispatch:        # manuel çalıştırma — PIN_APPS boş = hepsi

permissions:
  contents: write           # to commit the updated state.json

concurrency:
  group: pinterest-daily
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r _automation/pinterest/requirements.txt

      - name: Hedef app + adet (tetikleyen cron'a göre — saat hedefleme)
        id: t
        run: |
          case "${{ github.event.schedule }}" in
            "0 18 * * *") echo "apps=routevia"        >> "$GITHUB_OUTPUT"; echo "n=2" >> "$GITHUB_OUTPUT" ;;  # TR akşam
            "0 20 * * *") echo "apps=onebag,rentflow" >> "$GITHUB_OUTPUT"; echo "n=2" >> "$GITHUB_OUTPUT" ;;  # AB+ABD
            *)            echo "apps="                >> "$GITHUB_OUTPUT"; echo "n=3" >> "$GITHUB_OUTPUT" ;;  # manuel = hepsi
          esac

      - name: Post pins
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIN_APPS: ${{ steps.t.outputs.apps }}
          PINS_PER_RUN: ${{ steps.t.outputs.n }}
        working-directory: _automation/pinterest
        run: python poster.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain _automation/pinterest/state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _automation/pinterest/state.json
            git commit -m "chore(pinterest): update pinned state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
