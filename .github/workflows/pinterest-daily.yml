name: Pinterest daily pins

on:
  # ✅ Standard access ONAYLANDI (2026-06-23) → cron AÇIK. Günde ~12 pin.
  #   token + secret'lar (REFRESH_TOKEN/APP_ID/APP_SECRET/PEXELS) yerinde.
  schedule:
    - cron: "0 18 * * *"   # 21:00 TR → Routevia (Türkiye akşam prime)
    - cron: "0 20 * * *"   # 22:00 CET → OneBag + RentFlow (Avrupa akşam prime)
    - cron: "0 1 * * *"    # 20:00 EST / 17:00 PST → OneBag + RentFlow (ABD akşam prime)
  workflow_dispatch:        # manuel çalıştırma — apps/count ile hedefli
    inputs:
      apps:
        description: "Virgülle app listesi (boş = hepsi). örn: onebag,rentflow"
        default: ""
      count:
        description: "Atılacak pin sayısı"
        default: "1"

permissions:
  contents: write           # to commit the updated state.json

concurrency:
  group: pinterest-daily
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r _automation/pinterest/requirements.txt

      - name: Hedef app + adet (tetikleyen cron'a göre — saat hedefleme)
        id: t
        run: |
          case "${{ github.event.schedule }}" in
            "0 18 * * *") echo "apps=routevia"        >> "$GITHUB_OUTPUT"; echo "n=5" >> "$GITHUB_OUTPUT" ;;  # TR akşam → Routevia 5
            "0 20 * * *") echo "apps=onebag,rentflow" >> "$GITHUB_OUTPUT"; echo "n=7" >> "$GITHUB_OUTPUT" ;;  # AB akşam → OneBag ~4 + RentFlow ~3
            "0 1 * * *")  echo "apps=onebag,rentflow" >> "$GITHUB_OUTPUT"; echo "n=6" >> "$GITHUB_OUTPUT" ;;  # ABD akşam → OneBag ~3 + RentFlow ~3
            *)            echo "apps=${{ github.event.inputs.apps }}" >> "$GITHUB_OUTPUT"; echo "n=${{ github.event.inputs.count }}" >> "$GITHUB_OUTPUT" ;;  # manuel = input'lar (boş app=hepsi, varsayılan 1)
          esac

      - name: Post pins
        env:
          # Tercih edilen: refresh-token modu (her çalışmada taze access token, hiç sönmez)
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          # Alternatif: tek seferlik statik token (30 günde söner)
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIN_APPS: ${{ steps.t.outputs.apps }}
          PINS_PER_RUN: ${{ steps.t.outputs.n }}
        working-directory: _automation/pinterest
        run: python poster.py

      - name: Pin blog posts (apps.tabserve.com.tr)
        env:
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        working-directory: _automation/pinterest
        run: python blog_pins.py

      - name: Pin gezi.tabserve.com.tr gezilecek-yerler (Türkiye prime + manuel)
        if: github.event.schedule == '0 18 * * *' || github.event_name == 'workflow_dispatch'
        env:
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEZI_PINS_PER_RUN: "1"
        working-directory: _automation/pinterest
        run: python gezi_pins.py

      - name: Commit updated state
        run: |
          FILES="_automation/pinterest/state.json _automation/pinterest/blog_pins_state.json _automation/pinterest/gezi_pins_state.json"
          [ -n "$(git status --porcelain $FILES)" ] || { echo "No state change to commit."; exit 0; }
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for F in $FILES; do [ -f "$F" ] && cp "$F" "/tmp/$(basename $F)"; done
          for i in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main   # state-only; pin zaten atıldı, reset güvenli
            for F in $FILES; do
              B="/tmp/$(basename $F)"; [ -f "$B" ] || continue
              python3 -c "import json,os;f='$F';b='$B';c=json.load(open(f)) if os.path.exists(f) else {};o=json.load(open(b));[c.__setitem__(k,list(dict.fromkeys(c.get(k,[])+v)) if isinstance(v,list) else v) for k,v in o.items()];json.dump(c,open(f,'w'),ensure_ascii=False)"
            done
            git add $FILES
            git commit -m "chore(pinterest): update pinned state [skip ci]" || exit 0
            git push && exit 0 || sleep $((RANDOM % 5 + 3))
          done
          echo "::warning::pinterest state push başarısız (tekrar pinleyebilir; ölümcül değil)"
