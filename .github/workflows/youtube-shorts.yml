name: YouTube Shorts

on:
  # ✅ Günlük otomatik Short — saat hedefleme (kitleye göre)
  schedule:
    - cron: "0 18 * * *"   # 21:00 TR  → Routevia (Türkiye akşam prime)
    - cron: "0 20 * * *"   # 22:00 CET → OneBag  (Avrupa akşam)
    - cron: "0 1 * * *"    # 20:00 EST → RentFlow (ABD akşam prime)
  workflow_dispatch:
    inputs:
      app:
        description: "routevia | onebag | rentflow"
        default: "routevia"
      privacy:
        description: "private | unlisted | public (audit'e kadar private)"
        default: "private"

permissions:
  contents: write           # shorts_state.json (dedup) geri commit

concurrency:
  group: youtube-shorts
  cancel-in-progress: false

jobs:
  short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System deps (ffmpeg + fonts)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Python deps
        run: pip install requests Pillow edge-tts
      - name: Hedef app (cron saatine göre)
        id: pick
        run: |
          case "${{ github.event.schedule }}" in
            "0 18 * * *") echo "app=routevia" >> "$GITHUB_OUTPUT" ;;
            "0 20 * * *") echo "app=onebag"   >> "$GITHUB_OUTPUT" ;;
            "0 1 * * *")  echo "app=rentflow" >> "$GITHUB_OUTPUT" ;;
            *)            echo "app=${{ github.event.inputs.app }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Generate Short
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python _automation/shorts/make_short.py app "${{ steps.pick.outputs.app }}" "${{ runner.temp }}/short.mp4"
      - name: Upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
        run: python _automation/shorts/youtube_upload.py "${{ runner.temp }}/short.mp4"
      - name: Upload to TikTok (inbox/draft)
        id: tiktok
        continue-on-error: true        # TikTok hatası YouTube akışını bozmasın
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_SB_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_SB_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_SB_REFRESH_TOKEN }}
          TIKTOK_PRIVACY: PUBLIC_TO_EVERYONE   # direct mod için; audit onayı sonrası geçerli
        # mod: 'inbox' (audit'siz, taslak) | 'direct' (audit sonrası otomatik public). Onay gelince 'direct' yap.
        run: python _automation/shorts/tiktok_upload.py "${{ runner.temp }}/short.mp4" "${{ steps.pick.outputs.app }}" inbox
      - name: Rotated TikTok refresh token'ı kaydet (1 yıl sayacını sıfırlar → hiç re-auth gerekmez)
        if: steps.tiktok.outputs.new_refresh_token != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set TIKTOK_SB_REFRESH_TOKEN --body "${{ steps.tiktok.outputs.new_refresh_token }}" --repo "$GITHUB_REPOSITORY"
      - name: Commit dedup state
        run: |
          if [[ -n "$(git status --porcelain _automation/shorts/shorts_state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _automation/shorts/shorts_state.json
            git commit -m "chore(shorts): update dedup state [skip ci]"
            git push
          fi
      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ steps.pick.outputs.app }}
          path: |
            ${{ runner.temp }}/short.mp4
            ${{ runner.temp }}/short.meta.txt
