<!doctype html>
<html lang="tr">
<head>
<meta name="google-adsense-account" content="ca-pub-7579691213276550">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>TikTok Yetkilendirme — Tabserve</title>
<style>
body{margin:0;background:#0a0b12;color:#fff;font:16px/1.6 -apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:620px;background:#141622;border-radius:16px;padding:32px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
h1{margin:0 0 8px;font-size:22px}
code{display:block;word-break:break-all;background:#0a0b12;border:1px solid #2a2d3d;border-radius:10px;
  padding:16px;margin:16px 0;font-size:14px;color:#5fe0b0}
button{background:#5fe0b0;color:#04221a;border:0;border-radius:10px;padding:12px 22px;font-weight:800;
  font-size:15px;cursor:pointer}
.muted{opacity:.7;font-size:14px}
</style>
</head>
<body>
<div class="box">
<h1>TikTok Yetkilendirme Kodu</h1>
<p class="muted">Aşağıdaki kodu kopyalayıp kuruluma yapıştır. (Bu sayfa public değildir, kodu kimseyle paylaşma.)</p>
<code id="code">Kod bulunamadı — bu sayfaya TikTok izin akışından gelmelisin.</code>
<button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent);this.textContent='Kopyalandı ✓'">Kodu Kopyala</button>
</div>
<script>
  var p=new URLSearchParams(location.search);
  var code=p.get('code'), err=p.get('error');
  if(code) document.getElementById('code').textContent=code;
  else if(err) document.getElementById('code').textContent='Hata: '+err+' — '+(p.get('error_description')||'');
</script>
<div id="cookie-banner" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#fff;border-top:1px solid #e5e5e5;box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:13px 18px;font-size:13.5px;color:#384250;line-height:1.5"><div style="max-width:1080px;margin:0 auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center"><span>We use cookies for analytics and advertising (incl. Google AdSense). See our <a href="/cookies/" style="color:#1d4ed8">Cookie Policy</a>.</span><span style="display:flex;gap:8px"><button onclick="cookieOK(true)" style="background:#059669;color:#fff;border:0;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer">Accept</button><button onclick="cookieOK(false)" style="background:#eee;color:#333;border:0;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer">Decline</button></span></div></div><script>(function(){try{if(!localStorage.getItem("cookie_consent"))document.getElementById("cookie-banner").style.display="block";}catch(e){}})();function cookieOK(v){try{localStorage.setItem("cookie_consent",v?"accepted":"rejected");}catch(e){}document.getElementById("cookie-banner").style.display="none";}</script>
</body>
</html>
