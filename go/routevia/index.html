<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routevia'yı İndir — Gezilecek Yerler & Rota</title>
<meta name="description" content="Routevia'yı indir: Türkiye gezilecek yerler ve akıllı rota planlama. App Store & Google Play.">
<meta property="og:title" content="Routevia'yı İndir — Gezilecek Yerler & Rota">
<meta property="og:description" content="Türkiye'nin gezilecek yerlerini keşfet, rota planla. iOS ve Android.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://coinsayfasi.github.io/go/routevia/">
<script>
  (function () {
    var APPSTORE = "https://apps.apple.com/app/id6761003117";
    var PLAY = "https://play.google.com/store/apps/details?id=com.yunusgunes.routevia";
    var ua = navigator.userAgent || "";
    var ios = /iPad|iPhone|iPod/.test(ua) ||
              (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    var android = /Android/.test(ua);
    if (ios) location.replace(APPSTORE);
    else if (android) location.replace(PLAY);
  })();
</script>

  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
